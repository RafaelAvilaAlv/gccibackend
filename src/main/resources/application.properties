spring.application.name=gcci

# ===============================
# DATABASE (MySQL - Railway/Render)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gcci_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# SOLO PARA DESARROLLO LOCAL
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===============================
# SERVER (Render usa PORT din·mico)
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
app.jwt.expiration=86400000

# ===============================
# CORS (CLAVE PARA VERCEL)
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html